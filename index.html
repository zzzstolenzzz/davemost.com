<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Dave Most — chat with my personal AI agent." />
  <title>Dave Most</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb33;
      --user-bg: #1f6feb;
      --agent-bg: #21262d;
      --input-bg: #0d1117;
      --send-bg: #238636;
      --send-hover: #2ea043;
      --radius: 12px;
      --radius-sm: 6px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    header p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .chat-container {
      flex: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      padding: 0 1rem;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .msg-icon {
      background: var(--user-bg);
      color: #fff;
    }

    .msg.agent .msg-icon {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .msg-body {
      padding: 0.6rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-body {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: var(--radius-sm);
    }

    .msg.agent .msg-body {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: var(--radius-sm);
    }

    .msg.agent.error .msg-body {
      border-color: #f8514966;
      color: #f85149;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0.5rem 0;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dot 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      padding: 1rem 0 1.25rem;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.5rem 0.5rem 0.875rem;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
      padding: 0;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    #send {
      flex-shrink: 0;
      background: var(--send-bg);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.85rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-end;
      line-height: 1.5;
    }

    #send:hover:not(:disabled) {
      background: var(--send-hover);
    }

    #send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 0.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .msg { max-width: 95%; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="avatar">DM</div>
    <div>
      <h1>Dave Most</h1>
      <p>Personal AI agent</p>
    </div>
  </header>

  <div class="chat-container">
    <div id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="msg agent">
        <div class="msg-icon" aria-hidden="true">DM</div>
        <div class="msg-body">Hey! I'm Dave's AI agent. Ask me anything about Dave — his work, interests, background, or just say hi.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          rows="1"
          placeholder="Message Dave's agent…"
          maxlength="2000"
          autocomplete="off"
          aria-label="Message input"
        ></textarea>
        <button id="send" type="button" aria-label="Send message">Send</button>
      </div>
      <p class="hint">Press Enter to send · Shift+Enter for a new line</p>
    </div>
  </div>

  <script>
    (function () {
      var API = "https://ci70biixgd.execute-api.us-east-1.amazonaws.com/chat";

      var messages = document.getElementById("messages");
      var input = document.getElementById("input");
      var sendBtn = document.getElementById("send");

      function autoResize() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 160) + "px";
      }

      input.addEventListener("input", autoResize);

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      sendBtn.addEventListener("click", send);

      function addMessage(role, text, isError) {
        var div = document.createElement("div");
        div.className = "msg " + role + (isError ? " error" : "");

        var icon = document.createElement("div");
        icon.className = "msg-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = role === "user" ? "You" : "DM";

        var body = document.createElement("div");
        body.className = "msg-body";
        body.textContent = text;

        div.appendChild(icon);
        div.appendChild(body);
        messages.appendChild(div);
        scrollToBottom();
        return div;
      }

      function addTyping() {
        var div = document.createElement("div");
        div.className = "msg agent";
        div.id = "typing";

        var icon = document.createElement("div");
        icon.className = "msg-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = "DM";

        var body = document.createElement("div");
        body.className = "msg-body";

        var dots = document.createElement("div");
        dots.className = "typing-dots";
        dots.innerHTML = "<span></span><span></span><span></span>";

        body.appendChild(dots);
        div.appendChild(icon);
        div.appendChild(body);
        messages.appendChild(div);
        scrollToBottom();
        return div;
      }

      function removeTyping() {
        var t = document.getElementById("typing");
        if (t) t.remove();
      }

      function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight;
      }

      function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled = on;
      }

      function send() {
        var text = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        input.value = "";
        input.style.height = "auto";
        setLoading(true);

        var typing = addTyping();

        fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            removeTyping();
            var reply = (data && (data.reply || data.message || data.response || data.answer)) || JSON.stringify(data);
            addMessage("agent", reply);
          })
          .catch(function (err) {
            removeTyping();
            addMessage("agent", "Sorry, something went wrong. Please try again.", true);
            console.error(err);
          })
          .finally(function () {
            setLoading(false);
            input.focus();
          });
      }
    })();
  </script>
</body>
</html>
